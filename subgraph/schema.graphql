type Document @entity {
  id: Bytes! # The docId
  owner: Bytes! # address
  issuer: Bytes! # address
  cid: String!
  isRevoked: Boolean!
  timestamp: BigInt!
  accessGrants: [AccessGrant!]! @derivedFrom(field: "document")
}

type AccessGrant @entity {
  id: ID! # docId + "-" + verifier
  document: Document!
  verifier: Bytes! # address
}

type User @entity {
  id: Bytes! # address
  nominee: Bytes # address
}
